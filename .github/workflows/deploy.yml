name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    name: Validate HTML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install HTML validator
        run: npm install -g html-validate

      - name: Create html-validate config
        run: |
          cat > .htmlvalidate.json << 'HVCFG'
          {
            "extends": ["html-validate:recommended"],
            "rules": {
              "no-inline-style": "off",
              "long-title": "off",
              "no-trailing-whitespace": "off",
              "prefer-native-element": "off",
              "element-required-attributes": "off",
              "aria-label-misuse": "off",
              "void-style": "off",
              "attr-quotes": "off"
            }
          }
          HVCFG

      - name: Validate index.html
        run: |
          html-validate index.html && echo "✅ HTML validation passed" || {
            echo "❌ HTML validation failed — deploy blocked"
            exit 1
          }

      - name: Check critical file presence
        run: |
          echo "Checking required files..."
          for f in index.html sw.js manifest.json; do
            [ -f "$f" ] && echo "✅ $f present" || { echo "❌ $f MISSING"; exit 1; }
          done

      - name: Check service worker cache version
        run: |
          SW_VER=$(grep -o "aguirretech-checklist-v[0-9]*" sw.js | head -1)
          echo "✅ Service worker cache: $SW_VER"

  deploy:
    name: Deploy
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployment summary
        run: |
          echo "## ✅ Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Live URL:** ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY

  notify:
    name: Notify
    needs: [validate, deploy]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send success email
        if: needs.deploy.result == 'success'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.NOTIFY_EMAIL_USER }}
          password: ${{ secrets.NOTIFY_EMAIL_PASS }}
          subject: "✅ Drone Checklist deployed successfully"
          to: ${{ secrets.NOTIFY_EMAIL_TO }}
          from: AguirreTech Deploy <${{ secrets.NOTIFY_EMAIL_USER }}>
          body: |
            ✅ Deployment succeeded

            Live URL: https://aguirretech.github.io/drone-checklist/
            Commit: ${{ github.sha }}
            Triggered by: ${{ github.actor }}
            Time: ${{ github.event.head_commit.timestamp }}

            Commit message: ${{ github.event.head_commit.message }}

      - name: Send failure email
        if: needs.validate.result == 'failure' || needs.deploy.result == 'failure'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.NOTIFY_EMAIL_USER }}
          password: ${{ secrets.NOTIFY_EMAIL_PASS }}
          subject: "❌ Drone Checklist deployment FAILED"
          to: ${{ secrets.NOTIFY_EMAIL_TO }}
          from: AguirreTech Deploy <${{ secrets.NOTIFY_EMAIL_USER }}>
          body: |
            ❌ Deployment failed

            Validate job: ${{ needs.validate.result }}
            Deploy job:   ${{ needs.deploy.result }}

            Commit: ${{ github.sha }}
            Triggered by: ${{ github.actor }}
            Time: ${{ github.event.head_commit.timestamp }}

            Check the Actions log for details:
            https://github.com/AguirreTech/drone-checklist/actions
