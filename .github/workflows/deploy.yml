name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    name: Validate HTML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Check required files present
        run: |
          echo "Checking required files..."
          MISSING=0
          for f in index.html sw.js manifest.json; do
            if [ -f "$f" ]; then
              echo "✅ $f present ($(wc -c < $f) bytes)"
            else
              echo "❌ $f MISSING"
              MISSING=1
            fi
          done
          [ $MISSING -eq 0 ] || exit 1

      - name: Check HTML is non-empty and well-formed
        run: |
          SIZE=$(wc -c < index.html)
          echo "index.html size: $SIZE bytes"
          [ $SIZE -gt 10000 ] || { echo "❌ index.html suspiciously small"; exit 1; }
          echo "✅ File size OK"

          # Check for critical structural markers
          for marker in "<!DOCTYPE html>" "<html" "</html>" "drone-checklist" "AguirreTech"; do
            grep -q "$marker" index.html && echo "✅ Found: $marker" || { echo "❌ Missing: $marker"; exit 1; }
          done

      - name: Check service worker cache version
        run: |
          SW_VER=$(grep -o "aguirretech-checklist-v[0-9]*" sw.js | head -1)
          echo "✅ Service worker cache: $SW_VER"

      - name: Check manifest valid JSON
        run: |
          python3 -c "import json; json.load(open('manifest.json')); print('✅ manifest.json is valid JSON')"

      - name: Check PWA requirements
        run: |
          grep -q '"name"' manifest.json && echo "✅ manifest has name" || { echo "❌ manifest missing name"; exit 1; }
          grep -q '"start_url"' manifest.json && echo "✅ manifest has start_url" || { echo "❌ manifest missing start_url"; exit 1; }
          grep -q 'serviceWorker' index.html && echo "✅ service worker registered in HTML" || { echo "❌ service worker not found in HTML"; exit 1; }

  deploy:
    name: Deploy
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployment summary
        run: |
          echo "## ✅ Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Live URL:** ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY

  notify:
    name: Notify
    needs: [validate, deploy]
    runs-on: ubuntu-latest
    if: always()
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Send success email
        if: needs.deploy.result == 'success'
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.NOTIFY_EMAIL_USER }}
          password: ${{ secrets.NOTIFY_EMAIL_PASS }}
          subject: "✅ Drone Checklist deployed successfully"
          to: ${{ secrets.NOTIFY_EMAIL_TO }}
          from: AguirreTech Deploy <${{ secrets.NOTIFY_EMAIL_USER }}>
          body: |
            ✅ Deployment succeeded

            Live URL: https://aguirretech.github.io/drone-checklist/
            Commit: ${{ github.sha }}
            Triggered by: ${{ github.actor }}
            Time: ${{ github.event.head_commit.timestamp }}

            Commit message: ${{ github.event.head_commit.message }}

      - name: Send failure email
        if: needs.validate.result == 'failure' || needs.deploy.result == 'failure'
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.NOTIFY_EMAIL_USER }}
          password: ${{ secrets.NOTIFY_EMAIL_PASS }}
          subject: "❌ Drone Checklist deployment FAILED"
          to: ${{ secrets.NOTIFY_EMAIL_TO }}
          from: AguirreTech Deploy <${{ secrets.NOTIFY_EMAIL_USER }}>
          body: |
            ❌ Deployment failed

            Validate job: ${{ needs.validate.result }}
            Deploy job:   ${{ needs.deploy.result }}

            Commit: ${{ github.sha }}
            Triggered by: ${{ github.actor }}
            Time: ${{ github.event.head_commit.timestamp }}

            Check the Actions log for details:
            https://github.com/AguirreTech/drone-checklist/actions
